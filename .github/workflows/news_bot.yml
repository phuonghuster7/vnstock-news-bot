name: Auto Update News Report

on:
  schedule:
    # 1. Báo cáo cuối ngày: Chạy mỗi 30 phút từ 00:00 UTC đến 12:00 UTC (7h sáng - 7h tối VN)
    - cron: '*/30 0-12 * * 1-5'
    # 2. Cảnh báo Intraday: Chạy mỗi 30 phút trong giờ giao dịch (02:00 UTC đến 08:00 UTC)
    - cron: '*/30 2-8 * * 1-5'
    # 3. Chatbot Polling: Chạy mỗi 5 phút liên tục 24/7
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-bots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r experiments/scratch/requirements.txt

      - name: Export Secrets
        run: echo "Environment configured."
        env:
          GITHUB_ACTIONS: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}

      - name: Run Chatbot (every 5 mins)
        if: github.event.schedule == '*/5 * * * *' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python experiments/scratch/telegram_chatbot.py

      - name: Run Intraday Alerts (every 30 mins)
        if: github.event.schedule == '*/30 2-8 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python experiments/scratch/run_intraday_alerts.py

      - name: Run Daily Scraper (every 30 mins)
        if: github.event.schedule == '*/30 0-12 * * 1-5' || github.event_name == 'workflow_dispatch'
        env:
          GITHUB_ACTIONS: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          VNSTOCK_API_KEY: ${{ secrets.VNSTOCK_API_KEY }}
        run: python experiments/scratch/run_today_news_report.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add experiments/scratch/docs/index.html || true
          git add experiments/scratch/telegram_offset.txt || true
          git commit -m "Auto-update Bảng tin & Chatbot Offset" || echo "No changes to commit"
          git push origin main
