name: Auto Update News Report

on:
  schedule:
    # Chạy tự động mỗi giờ từ 00:00 UTC đến 12:00 UTC (tức 7:00 sáng đến 7:00 tối giờ VN)
    - cron: '0 0-12 * * 1-5' # Chạy từ T2 đến T6
  workflow_dispatch: # Cho phép bấm chạy thủ công trên GitHub

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r experiments/scratch/requirements.txt

      - name: Run News Scraper
        env:
          GITHUB_ACTIONS: "true"
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python experiments/scratch/run_today_news_report.py

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action Bot"
          git add experiments/scratch/docs/index.html
          git commit -m "Auto-update Bảng tin Tài chính" || echo "No changes to commit"
          git push origin main
